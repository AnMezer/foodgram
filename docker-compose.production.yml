volumes:
  pg_data:
  static:
  media:

services:
  db:
    image: postgres:15-alpine
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-django_user} -d ${POSTGRES_DB:-django_db}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s


  backend:
    image: anmezer/foodgram_backend:latest
    #build: ./backend
    env_file: .env
    depends_on:
      - db
    volumes:
      - static:/backend_static
      - media:/media
      - ./data:/data
    restart: unless-stopped

  frontend:
    env_file: .env
    image: anmezer/foodgram_frontend:latest
    #build: ./frontend
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static:/frontend_static
    restart: on-failure

  nginx:
    image: anmezer/foodgram_nginx:latest
    #build: ./nginx
    depends_on:
      - backend
    env_file: .env
    ports:
      - 8000:80
    volumes:
      - static:/staticfiles
      - media:/media
    restart: unless-stopped



