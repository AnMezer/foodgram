
volumes:
  pg_data:
  static:
  media:

services:
  db:
    image: postgres:15-alpine
    env_file: .env
    environment:
      - DB_HOST=localhost
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-django_user} -d ${POSTGRES_DB:-django_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    env_file: .env
    environment:
      - ALLOWED_HOSTS=localhost,127.0.0.1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static:/backend_static
      - media:/media
      - ./data:/data
    command:
      python manage.py runserver 0.0.0.0:8000
    restart: unless-stopped

  frontend:
    build: ./frontend
    env_file: .env
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api/
    volumes:
      - static:/frontend_static
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.22-alpine
    ports:
      - 8000:80
    volumes:
      - ./nginx/nginx_local.conf:/etc/nginx/conf.d/default.conf
      - static:/staticfiles
      - media:/media
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
